# Minimal AOOSTAR panel mapping for TrueNAS / generic Linux hosts.
# Keys on the left are used in monitor.json; values come from aster-sysinfo.
#
# Network and per-disk fields depend on your hardware. Extend this file in
# /data/sensor-mapping.cfg if you need interface- or disk-specific labels.

cpu_percent: cpu_usage_percent
cpu_temperature: temperature_cpu
memory_usage: mem_usage_percent
memory_Temperature: temperature_memory
gpu_temperature: temperature_gpu
