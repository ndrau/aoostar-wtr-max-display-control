# AOOSTAR panel mapping for TrueNAS / generic Linux hosts.
# Keys on the left are used in monitor.json; values come from aster-sysinfo / extras.
#
# Disk temperature fields are mapped from storage_ssd[N]_temperature /
# storage_hdd[N]_temperature into the AOOSTAR panel keys automatically.

cpu_percent: cpu_usage_percent
cpu_temperature: temperature_cpu
memory_usage: mem_usage_percent
memory_Temperature: temperature_memory
gpu_temperature: temperature_gpu
motherboard_temperature: temperature_motherboard

# Fan RPM values are collected from /sys/class/hwmon when host /sys is mounted.
fan_cpu_rpm: fan_primary_rpm
fan_system_rpm: fan_secondary_rpm
